<!DOCTYPE html>
<html>
  <head>
    <title>Lurker</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .badge {
        display: inline-block;
        font-weight: 600;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        letter-spacing: 0.3px;
      }
      .badge-buy  { background: #1e2e2a; color: #1ABC9C; }
      .badge-sell { background: #2e1e1e; color: #e05252; }
      .ticker-badge {
        display: inline-block;
        background: #252830;
        color: #c0c0c0;
        font-weight: 600;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 4px;
      }
      .amount-cell { font-weight: 600; color: #e0e0e0; white-space: nowrap; }
      .top5-card {
        flex: 0 0 210px;
        border: 1px solid #2a2d30;
        border-radius: 8px;
        padding: 1rem;
        background: #252830;
        border-left: 3px solid #1ABC9C;
        position: relative;
      }
      .top5-rank {
        position: absolute; top: -10px; left: 12px;
        background: #1ABC9C; color: #141618;
        font-size: 10px; font-weight: 700;
        padding: 1px 8px; border-radius: 20px;
      }
      .top5-market {
        font-size: 12px; font-weight: 600; color: #e0e0e0;
        margin-bottom: 0.6rem; line-height: 1.4; margin-top: 0.4rem;
      }
      .top5-outcome {
        display: inline-block; font-size: 10px; font-weight: 700;
        padding: 2px 8px; border-radius: 4px;
        background: #2a2d30; color: #e0e0e0; margin-bottom: 0.6rem;
      }
      .top5-stats {
        display: grid; grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }
      .top5-stat-label {
        font-size: 9px; color: #7F8C8D;
        text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px;
      }
      .top5-stat-value { font-size: 14px; font-weight: 700; color: #e0e0e0; }
      .top5-stat-value.green { color: #1ABC9C; }
      .top5-scroll {
        display: flex;
        gap: 0.75rem;
        overflow-x: auto;
        padding-bottom: 0.75rem;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .top5-scroll::-webkit-scrollbar { height: 4px; }
      .top5-scroll::-webkit-scrollbar-track { background: #252830; border-radius: 2px; }
      .top5-scroll::-webkit-scrollbar-thumb { background: #1ABC9C; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div class="datetime-display" id="datetimeDisplay"></div>
    <div class="page">

      <div class="content-header">
        <h1>Lurker</h1>
        <p>Real-time market data and insights</p>
      </div>

      <div class="chart-section">
        <h2>Insider Trades — Last 7 Days</h2>
        <p class="section-sub">Recent insider trades ordered by notional value</p>
        <div id="insiderLoading" class="loading">
          <div class="spinner"></div> Loading…
        </div>
        <div id="insiderWrap" class="table-scroll" style="display:none;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Insider</th>
                <th>Ticker</th>
                <th>Company</th>
                <th>Action</th>
                <th>Shares</th>
                <th>Notional Value</th>
              </tr>
            </thead>
            <tbody id="insiderBody"></tbody>
          </table>
        </div>
      </div>

      <div class="chart-section">
        <h2>Top 5 Consensus Bets</h2>
        <p class="section-sub">Ranked by number of top-50 accounts holding the same position</p>
        <div id="top5Loading" class="loading">
          <div class="spinner"></div> Loading…
        </div>
        <div id="top5Wrap" style="display:none;">
          <div id="top5Grid" class="top5-scroll"></div>
        </div>
      </div>

    </div>

    <script src="navbar.js"></script>
    <script>
      const SUPABASE_URL = 'https://vhhfoedqioqdoaecxuwx.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoaGZvZWRxaW9xZG9hZWN4dXd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTMxMTYsImV4cCI6MjA5Nzk4OTExNn0.ewy61NG[...]
      const WHALES_URL = './data/whales.json';

      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      };

      function fmt(amount) {
        if (!amount && amount !== 0) return '—';
        if (amount >= 1e9) return '$' + (amount / 1e9).toFixed(1) + 'B';
        if (amount >= 1e6) return '$' + (amount / 1e6).toFixed(1) + 'M';
        if (amount >= 1e3) return '$' + (amount / 1e3).toFixed(0) + 'K';
        return '$' + amount.toFixed(0);
      }

      function fmtDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function show(id) { document.getElementById(id).style.display = ''; }
      function hide(id) { document.getElementById(id).style.display = 'none'; }

      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
      const sevenDaysISO = sevenDaysAgo.toISOString();

      async function loadInsiderTrades() {
        const url = `${SUPABASE_URL}/rest/v1/insider_trades`
          + `?select=*`
          + `&trade_date=gte.${sevenDaysISO}`
          + `&order=notional_value.desc`
          + `&limit=20`;
        try {
          const resp = await fetch(url, { headers });
          return await resp.json();
        } catch (err) {
          console.error('Failed to load insider trades:', err);
          return [];
        }
      }

      async function loadTop5Consensus() {
        try {
          const resp = await fetch(WHALES_URL + '?t=' + Date.now());
          if (!resp.ok) return [];
          const data = await resp.json();
          return data.consensus || [];
        } catch (err) {
          console.error('Failed to load whales data:', err);
          return [];
        }
      }

      function renderInsiderTrades(trades) {
        hide('insiderLoading');
        show('insiderWrap');
        const tbody = document.getElementById('insiderBody');
        if (!trades.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="no-data">No insider trades found in the last 7 days.</td></tr>';
          return;
        }
        tbody.innerHTML = trades.map(t => `
          <tr>
            <td style="white-space:nowrap;">${fmtDate(t.trade_date)}</td>
            <td style="font-weight:500;color:#e0e0e0;">${t.insider_name || '—'}</td>
            <td><span class="ticker-badge">${t.ticker || '—'}</span></td>
            <td>${t.issuer_name || '—'}</td>
            <td><span class="badge ${t.action === 'Buy' ? 'badge-buy' : 'badge-sell'}">${t.action || '—'}</span></td>
            <td>${t.shares ? Math.abs(t.shares).toLocaleString() : '—'}</td>
            <td class="amount-cell">${fmt(t.notional_value)}</td>
          </tr>
        `).join('');
      }

      function renderTop5(consensus) {
        hide('top5Loading');
        show('top5Wrap');
        const grid = document.getElementById('top5Grid');
        if (!consensus?.length) {
          grid.innerHTML = '<div class="no-data">No shared bets found yet.</div>';
          return;
        }
        grid.innerHTML = consensus.slice(0, 5).map((c, i) => {
          const payoffStr = c.payoff_pct != null ? `+${Number(c.payoff_pct).toFixed(1)}%` : '—';
          return `
            <div class="top5-card">
              <div class="top5-rank">#${i+1}</div>
              <div style="margin-top:0.5rem;"><span class="top5-outcome">${c.outcome}</span></div>
              <div class="top5-market">${c.market}</div>
              <div class="top5-stats">
                <div><div class="top5-stat-label">Whales</div><div class="top5-stat-value green">${c.whale_count}</div></div>
                <div><div class="top5-stat-label">Avg Entry</div><div class="top5-stat-value">${c.avg_price}</div></div>
                <div><div class="top5-stat-label">Capital</div><div class="top5-stat-value">${fmt(c.total_capital)}</div></div>
                <div><div class="top5-stat-label">Payoff</div><div class="top5-stat-value green">${payoffStr}</div></div>
              </div>
            </div>`;
        }).join('');
      }

      async function init() {
        try {
          const [trades, consensus] = await Promise.all([
            loadInsiderTrades(),
            loadTop5Consensus()
          ]);
          renderInsiderTrades(trades);
          renderTop5(consensus);
        } catch (err) {
          console.error('Failed to initialize:', err);
          ['insiderLoading', 'top5Loading'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.textContent = 'Failed to load data.';
          });
        }
      }

      init();

      function updateDateTime() {
        const now = new Date();
        document.getElementById('datetimeDisplay').textContent =
          now.toLocaleDateString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric',
            year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
          });
      }
      updateDateTime();
      setInterval(updateDateTime, 1000);
    </script>
  </body>
</html>
