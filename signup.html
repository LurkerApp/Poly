<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up – Lurker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      body { 
        background: url('media/Lurker3.png') center/cover no-repeat fixed;
      }
      .page {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: #fff;
        border: 0.5px solid #e5e5e5;
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }
      .card-title {
        font-size: 22px;
        font-weight: 700;
        color: #111;
        margin-bottom: 1.5rem;
      }
      .field { margin-bottom: 1rem; }
      .field label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #555;
        margin-bottom: 5px;
      }
      .field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        font-size: 14px;
        color: #111;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }
      .field input:focus { border-color: #1D9E75; }
      .error-msg {
        font-size: 13px;
        color: #E24B4A;
        margin-top: 4px;
        display: none;
      }
      .submit-btn {
        width: 100%;
        background: #1D9E75;
        color: #fff;
        border: none;
        font-size: 15px;
        font-weight: 600;
        padding: 11px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 0.5rem;
        font-family: inherit;
        transition: background 0.15s;
      }
      .submit-btn:hover { background: #0F6E56; }
      .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
      .login-link {
        text-align: center;
        font-size: 14px;
        color: #555;
        margin-top: 1rem;
      }
      .login-link a {
        color: #1D9E75;
        text-decoration: none;
        font-weight: 500;
      }
      .login-link a:hover { text-decoration: underline; }
      .terms {
        font-size: 12px;
        color: #aaa;
        text-align: center;
        margin-top: 1rem;
        line-height: 1.6;
      }
      .terms a { color: #888; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="card-title">Create your account</div>

        <div class="field">
          <label>Username</label>
          <input id="username" type="text" placeholder="@username" />
          <div class="error-msg" id="username-error">Please enter a username</div>
        </div>

        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
          <div class="error-msg" id="email-error">Please enter a valid email</div>
        </div>

        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="At least 8 characters" />
          <div class="error-msg" id="password-error">Password must be at least 8 characters</div>
        </div>

        <div class="field">
          <label>Confirm password</label>
          <input id="confirm-password" type="password" placeholder="Repeat your password" />
          <div class="error-msg" id="confirm-error">Passwords do not match</div>
        </div>

        <div class="error-msg" id="supabase-error" style="margin-bottom:0.5rem;"></div>

        <button class="submit-btn" id="submitBtn" onclick="handleSignup()">Create account</button>

        <div class="terms">
          By signing up you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>
        <div class="login-link">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </div>
    </div>

    <script src="navbar.js"></script>
    <script>
      const supabase = window.supabase.createClient(
        'https://your-project-id.supabase.co',
        'your-anon-key'
      )

      async function handleSignup() {
        const username = document.getElementById('username').value.trim()
        const email = document.getElementById('email').value.trim()
        const password = document.getElementById('password').value.trim()
        const confirm = document.getElementById('confirm-password').value.trim()
        const btn = document.getElementById('submitBtn')

        // reset errors
        document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none')
        document.querySelectorAll('input').forEach(el => el.style.borderColor = '#e5e5e5')

        // validate
        let valid = true
        if (!username) {
          document.getElementById('username').style.borderColor = '#E24B4A'
          document.getElementById('username-error').style.display = 'block'
          valid = false
        }
        if (!email) {
          document.getElementById('email').style.borderColor = '#E24B4A'
          document.getElementById('email-error').style.display = 'block'
          valid = false
        }
        if (password.length < 8) {
          document.getElementById('password').style.borderColor = '#E24B4A'
          document.getElementById('password-error').style.display = 'block'
          valid = false
        }
        if (password !== confirm) {
          document.getElementById('confirm-password').style.borderColor = '#E24B4A'
          document.getElementById('confirm-error').style.display = 'block'
          valid = false
        }
        if (!valid) return

        // send to Supabase
        btn.disabled = true
        btn.textContent = 'Creating account...'

        const { error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: { username: username }
          }
        })

        if (error) {
          const errEl = document.getElementById('supabase-error')
          errEl.textContent = error.message
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Create account'
        } else {
          localStorage.setItem('loggedIn', 'true')
          localStorage.setItem('username', username)
          window.location.href = 'index.html'
        }
      }
    </script>
  </body>
</html>
