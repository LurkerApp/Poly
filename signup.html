<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up – Lurker</title>
    <link rel="stylesheet" href="style.css">
    <style>
      body {
        background: url('media/Lurker3.png') center/cover no-repeat fixed;
      }
      .page {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: #1f2224;
        border: 1px solid #2a2d30;
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }
      .card-title {
        font-size: 22px;
        font-weight: 700;
        color: #e0e0e0;
        margin-bottom: 1.5rem;
      }
      .field { margin-bottom: 1rem; }
      .field label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #7F8C8D;
        margin-bottom: 5px;
      }
      .field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #2a2d30;
        border-radius: 8px;
        font-size: 14px;
        color: #e0e0e0;
        background: #252830;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }
      .field input:focus { border-color: #1ABC9C; }
      .error-msg {
        font-size: 13px;
        color: #e05252;
        margin-top: 4px;
        display: none;
      }
      .success-msg {
        font-size: 13px;
        color: #1ABC9C;
        margin-top: 4px;
        display: none;
        margin-bottom: 0.5rem;
      }
      .submit-btn {
        width: 100%;
        background: #1ABC9C;
        color: #141618;
        border: none;
        font-size: 15px;
        font-weight: 600;
        padding: 11px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 0.5rem;
        font-family: inherit;
        transition: background 0.15s;
      }
      .submit-btn:hover { background: #17a589; }
      .submit-btn:disabled { background: #2a2d30; color: #5a6068; cursor: not-allowed; }
      .login-link {
        text-align: center;
        font-size: 14px;
        color: #7F8C8D;
        margin-top: 1rem;
      }
      .login-link a {
        color: #1ABC9C;
        text-decoration: none;
        font-weight: 500;
      }
      .login-link a:hover { text-decoration: underline; }
      .terms {
        font-size: 12px;
        color: #5a6068;
        text-align: center;
        margin-top: 1rem;
        line-height: 1.6;
      }
      .terms a { color: #7F8C8D; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="card-title">Create your account</div>

        <div class="field">
          <label>Username</label>
          <input id="username" type="text" placeholder="@username" />
          <div class="error-msg" id="username-error">Please enter a username</div>
        </div>

        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
          <div class="error-msg" id="email-error">Please enter a valid email</div>
        </div>

        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="At least 8 characters" />
          <div class="error-msg" id="password-error">Password must be at least 8 characters</div>
        </div>

        <div class="field">
          <label>Confirm password</label>
          <input id="confirm-password" type="password" placeholder="Repeat your password" />
          <div class="error-msg" id="confirm-error">Passwords do not match</div>
        </div>

        <div class="success-msg" id="success-msg"></div>
        <div class="error-msg" id="supabase-error" style="margin-bottom:0.5rem;"></div>

        <button class="submit-btn" id="submitBtn" onclick="handleSignup()">Create account</button>

        <div class="terms">
          By signing up you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>
        <div class="login-link">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="navbar.js"></script>
    <script>
      const { createClient } = supabase

      const client = createClient(
        'https://vhhfoedqioqdoaecxuwx.supabase.co',
        'sb_publishable_NmbPR4rRq3z5JmAGimeqBg_R1j6BCl-'
      )

      async function handleSignup() {
        const username = document.getElementById('username').value.trim()
        const email    = document.getElementById('email').value.trim()
        const password = document.getElementById('password').value.trim()
        const confirm  = document.getElementById('confirm-password').value.trim()
        const btn      = document.getElementById('submitBtn')

        document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none')
        document.querySelectorAll('.success-msg').forEach(el => el.style.display = 'none')
        document.querySelectorAll('input').forEach(el => el.style.borderColor = '#2a2d30')

        let valid = true
        if (!username) {
          document.getElementById('username').style.borderColor = '#e05252'
          document.getElementById('username-error').style.display = 'block'
          valid = false
        }
        if (!email) {
          document.getElementById('email').style.borderColor = '#e05252'
          document.getElementById('email-error').style.display = 'block'
          valid = false
        }
        if (password.length < 8) {
          document.getElementById('password').style.borderColor = '#e05252'
          document.getElementById('password-error').style.display = 'block'
          valid = false
        }
        if (password !== confirm) {
          document.getElementById('confirm-password').style.borderColor = '#e05252'
          document.getElementById('confirm-error').style.display = 'block'
          valid = false
        }
        if (!valid) return

        btn.disabled = true
        btn.textContent = 'Creating account...'

        const { data, error } = await client.auth.signUp({
          email,
          password,
          options: { data: { username } }
        })

        if (error) {
          const errEl = document.getElementById('supabase-error')
          errEl.textContent = error.message
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Create account'
        } else if (data && data.user) {
          await client.auth.updateUser({ data: { username, display_name: username } })
          localStorage.setItem('loggedIn', 'true')
          localStorage.setItem('username', username)
          localStorage.setItem('userId', data.user.id)
          const successEl = document.getElementById('success-msg')
          successEl.textContent = 'Account created successfully! Redirecting...'
          successEl.style.display = 'block'
          setTimeout(() => { window.location.href = 'index.html' }, 2000)
        } else {
          const errEl = document.getElementById('supabase-error')
          errEl.textContent = 'Signup failed. Please try again.'
          errEl.style.display = 'block'
          btn.disabled = false
          btn.textContent = 'Create account'
        }
      }
    </script>
  </body>
</html>
