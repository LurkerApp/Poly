<script src="navbar.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const SUPABASE_URL = "{{ secrets.SUPABASE_URL }}";
const SUPABASE_KEY = "{{ secrets.SUPABASE_KEY }}";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function loadData() {

    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 90);

    // ==========================
    // Top recipients (Last 90 Days)
    // ==========================

    const { data: awards, error } = await supabase
        .from("public_companies")
        .select("recipient_name, award_amount, created_at")
        .gte("created_at", cutoff.toISOString());

    if (error) {
        console.error(error);
        return;
    }

    const totals = {};

    awards.forEach(row => {

        const recipient = row.recipient_name || "Unknown";
        const amount = Number(row.award_amount) || 0;

        totals[recipient] = (totals[recipient] || 0) + amount;

    });

    const top10 = Object.entries(totals)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

    // ==========================
    // Chart
    // ==========================

    new Chart(document.getElementById("recipientChart"), {

        type: "bar",

        data: {
            labels: top10.map(r => r[0]),
            datasets: [{
                label: "Total Awards",
                data: top10.map(r => r[1])
            }]
        },

        options: {
            indexAxis: "y",
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                x: {
                    ticks: {
                        callback: value =>
                            "$" + Number(value).toLocaleString()
                    }
                }
            }
        }

    });

    // ==========================
    // Top 10 Table
    // ==========================

    const topBody = document.querySelector("#topRecipients tbody");

    top10.forEach((r, index) => {

        topBody.innerHTML += `
        <tr>
            <td>${index + 1}</td>
            <td>${r[0]}</td>
            <td>$${r[1].toLocaleString()}</td>
        </tr>
        `;

    });

    // ==========================
    // Latest 50 Awards
    // ==========================

    const { data: latest, error: latestError } = await supabase
        .from("public_companies")
        .select("recipient_name, award_amount, created_at")
        .order("created_at", { ascending: false })
        .limit(50);

    if (latestError) {
        console.error(latestError);
        return;
    }

    const latestBody = document.querySelector("#latestAwards tbody");

    latest.forEach(row => {

        latestBody.innerHTML += `
        <tr>
            <td>${new Date(row.created_at).toLocaleString()}</td>
            <td>${row.recipient_name || "Unknown"}</td>
            <td>$${Number(row.award_amount || 0).toLocaleString()}</td>
        </tr>
        `;

    });

}

loadData();

</script>
